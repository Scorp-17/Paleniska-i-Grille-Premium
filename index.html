<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OGIEN I STAL | Ekskluzywne Paleniska i Grille Premium</title>
    <script>
      // Safe robust fallback/mock to prevent external scripts, tests, or extensions from crashing or failing on window.ethereum access
      (function () {
        try {
          if (typeof window !== "undefined") {
            const noop = function () {};
            const mockEthereum = {
              isMetaMask: true,
              isConnected: function () {
                return true;
              },
              chainId: "0x1",
              networkVersion: "1",
              selectedAddress: "0x1234567890123456789012345678901234567890",
              request: async function (args) {
                if (!args) return null;
                const method = args.method;
                if (
                  method === "eth_requestAccounts" ||
                  method === "eth_accounts"
                ) {
                  return ["0x1234567890123456789012345678901234567890"];
                }
                if (method === "eth_chainId") {
                  return "0x1";
                }
                if (method === "net_version") {
                  return "1";
                }
                return null;
              },
              on: function () {
                return this;
              },
              removeListener: function () {
                return this;
              },
              addListener: function () {
                return this;
              },
              emit: function () {
                return true;
              },
            };

            if (!window.ethereum) {
              window.ethereum = mockEthereum;
            } else {
              // Patch existing with fallbacks
              if (typeof window.ethereum.isConnected !== "function")
                window.ethereum.isConnected = mockEthereum.isConnected;
              if (typeof window.ethereum.request !== "function")
                window.ethereum.request = mockEthereum.request;
              if (typeof window.ethereum.emit !== "function")
                window.ethereum.emit = noop;
              if (typeof window.ethereum.addListener !== "function")
                window.ethereum.addListener = noop;
              if (typeof window.ethereum.on !== "function")
                window.ethereum.on = noop;
              if (typeof window.ethereum.removeListener !== "function")
                window.ethereum.removeListener = noop;
            }
          }
        } catch (e) {
          console.warn("Could not patch window.ethereum: ", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
